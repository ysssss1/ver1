<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ReturnRx - 약국 반품 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .scan-box { border: 3px dashed #3b82f6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-lg mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">
    <!-- 헤더 -->
    <div class="bg-blue-600 text-white p-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold">ReturnRx</h1>
      <div class="flex gap-3">
        <button onclick="exportExcel()" class="bg-white text-blue-600 px-5 py-2 rounded-2xl text-sm font-semibold">엑셀</button>
        <button onclick="sendEmail()" class="bg-white text-blue-600 px-5 py-2 rounded-2xl text-sm font-semibold">메일</button>
      </div>
    </div>

    <!-- 탭 -->
    <div class="grid grid-cols-3 border-b">
      <button onclick="switchTab(0)" class="tab-btn py-4 text-center font-medium border-b-4 border-blue-600 text-blue-600" id="tab0-btn">📷 QR 스캔</button>
      <button onclick="switchTab(1)" class="tab-btn py-4 text-center font-medium" id="tab1-btn">📋 반품 목록</button>
      <button onclick="switchTab(2)" class="tab-btn py-4 text-center font-medium" id="tab2-btn">📊 계수기</button>
    </div>

    <!-- QR 스캔 탭 -->
    <div id="tab0" class="tab-content active p-4">
      <div id="qr-reader" class="scan-box w-full aspect-square rounded-3xl overflow-hidden mx-auto"></div>
      <p class="text-center text-sm text-gray-500 mt-4">의약품 QR코드(박스·통)를 카메라에 비춰주세요</p>
    </div>

    <!-- 반품 목록 탭 -->
    <div id="tab1" class="tab-content p-4">
      <div id="list" class="space-y-3 min-h-[400px]"></div>
      <button onclick="addManualItem()" class="w-full mt-6 py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-3xl text-lg font-medium flex items-center justify-center gap-2">
        <span class="text-2xl">+</span> 직접 입력 추가
      </button>
    </div>

    <!-- 계수기 탭 (Roboflow) -->
    <div id="tab2" class="tab-content p-4">
      <input type="file" id="photoInput" accept="image/*" capture="environment" class="hidden" onchange="countPills(this)">
      <button onclick="document.getElementById('photoInput').click()" class="w-full py-20 border-4 border-dashed border-gray-300 rounded-3xl text-center hover:border-blue-400">
        <div class="text-6xl mb-4">📸</div>
        <p class="text-xl font-semibold">알약 사진 찍기</p>
        <p class="text-sm text-gray-500 mt-2">낱알 개수 자동 인식 (Roboflow)</p>
      </button>
      <div id="count-result" class="mt-8 text-center"></div>
    </div>

    <!-- 하단 상태 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t text-xs text-gray-400 text-center py-3">
      ReturnRx v5 • API 키 승인 대기 중 • Roboflow 연동됨
    </div>
  </div>

  <script>
    // ================== 전역 변수 ==================
    let items = JSON.parse(localStorage.getItem('returnItems')) || [];
    let html5QrCode;

    // ================== GS1 파싱 (국내 의약품) ==================
    function parseGS1(data) {
      const result = { gtin: '', expiry: '', lot: '', serial: '', name: '' };
      const patterns = {
        gtin: /01(\d{14})/,
        expiry: /17(\d{6})/,
        lot: /10([A-Za-z0-9]+)/,
        serial: /21([A-Za-z0-9]+)/
      };

      for (let key in patterns) {
        const match = data.match(patterns[key]);
        if (match) result[key] = match[1];
      }

      // 유통기한 YYYY-MM-DD 변환
      if (result.expiry) {
        const y = '20' + result.expiry.substring(0,2);
        const m = result.expiry.substring(2,4);
        const d = result.expiry.substring(4,6);
        result.expiry = `${y}-${m}-${d}`;
      }
      return result;
    }

    // ================== QR 스캔 ==================
    function startQR() {
      const reader = document.getElementById('qr-reader');
      html5QrCode = new Html5Qrcode("qr-reader");
      
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          html5QrCode.stop();
          const parsed = parseGS1(decodedText);
          
          // 목록에 바로 추가
          items.unshift({
            id: Date.now(),
            unit: '낱알',
            qty: 1,
            name: parsed.name || '직접 입력',
            lot: parsed.lot || '',
            expiry: parsed.expiry || '',
            serial: parsed.serial || '',
            gtin: parsed.gtin || ''
          });
          saveItems();
          renderList();
          switchTab(1); // 반품 목록으로 이동
          alert('QR 인식 완료! 반품 목록에 추가되었습니다.');
        },
        (error) => {}
      ).catch(err => console.log(err));
    }

    // ================== 반품 목록 ==================
    function renderList() {
      const container = document.getElementById('list');
      container.innerHTML = items.map((item, idx) => `
        <div class="bg-gray-50 border border-gray-200 rounded-3xl p-4 flex gap-4">
          <div class="flex-1">
            <div class="flex justify-between">
              <span class="font-semibold">${item.name}</span>
              <span class="text-xs bg-white px-3 py-1 rounded-2xl">${item.unit} ${item.qty}</span>
            </div>
            <div class="text-xs text-gray-500 mt-1">
              유통기한: ${item.expiry || '-'}<br>
              로트: ${item.lot || '-'}<br>
              일련번호: ${item.serial || '-'}
            </div>
          </div>
          <button onclick="deleteItem(${idx})" class="text-red-500 text-3xl leading-none">×</button>
        </div>
      `).join('');
    }

    function saveItems() {
      localStorage.setItem('returnItems', JSON.stringify(items));
    }

    function addManualItem() {
      const name = prompt('의약품명', '');
      if (!name) return;
      const unit = confirm('완통(박스)입니까?\n확인 = 완통, 취소 = 낱알') ? '완통' : '낱알';
      const qty = parseInt(prompt('수량', '1')) || 1;
      const expiry = prompt('유통기한 (YYYY-MM-DD)', '');
      const lot = prompt('로트번호', '');
      const serial = prompt('일련번호', '');

      items.unshift({ id: Date.now(), unit, qty, name, lot, expiry, serial, gtin: '' });
      saveItems();
      renderList();
    }

    window.deleteItem = function(idx) {
      if (confirm('삭제하시겠습니까?')) {
        items.splice(idx, 1);
        saveItems();
        renderList();
      }
    };

    // ================== 엑셀 내보내기 ==================
    window.exportExcel = function() {
      if (items.length === 0) return alert('반품 목록이 비어있습니다.');
      
      const data = items.map(i => ({
        '의약품명': i.name,
        '단위': i.unit,
        '수량': i.qty,
        '유통기한': i.expiry,
        '로트번호': i.lot,
        '일련번호': i.serial,
        'GTIN': i.gtin
      }));

      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "반품목록");
      XLSX.writeFile(wb, `ReturnRx_반품_${new Date().toISOString().slice(0,10)}.xlsx`);
    };

    // ================== 이메일 보내기 ==================
    window.sendEmail = function() {
      if (items.length === 0) return alert('반품 목록이 비어있습니다.');
      
      let body = "반품 신청 목록\n\n";
      items.forEach(i => {
        body += `${i.name} | ${i.unit} ${i.qty}개 | 유통기한:${i.expiry} | 로트:${i.lot} | 일련:${i.serial}\n`;
      });
      body += `\n\n약국명: __________\n날짜: ${new Date().toISOString().slice(0,10)}`;

      const mailto = `mailto:your.email@example.com?subject=ReturnRx 반품 신청서&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    };

    // ================== Roboflow 계수기 ==================
    window.countPills = async function(input) {
      const file = input.files[0];
      if (!file) return;
      
      const resultDiv = document.getElementById('count-result');
      resultDiv.innerHTML = `<p class="text-blue-600">Roboflow AI가 알약을 세는 중...</p>`;
      
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const res = await fetch('https://detect.roboflow.com/pills-sxdht/1?api_key=D5tgTdayef5RWAWju8RK', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        const count = data.predictions ? data.predictions.length : 0;
        resultDiv.innerHTML = `
          <div class="text-6xl font-bold text-green-600">${count}개</div>
          <p class="text-sm text-gray-500 mt-2">Roboflow AI가 감지한 알약 수</p>
          <button onclick="addCountToList(${count})" class="mt-6 px-8 py-3 bg-green-600 text-white rounded-3xl">반품 목록에 추가하기</button>
        `;
      } catch(e) {
        resultDiv.innerHTML = `<p class="text-red-500">인식 실패<br>다시 사진을 찍어주세요</p>`;
      }
    };

    window.addCountToList = function(count) {
      const name = prompt('의약품명 입력', '');
      if (!name) return;
      items.unshift({
        id: Date.now(),
        unit: '낱알',
        qty: count,
        name: name,
        lot: '',
        expiry: '',
        serial: '',
        gtin: ''
      });
      saveItems();
      renderList();
      switchTab(1);
    };

    // ================== 탭 전환 ==================
    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('border-b-4', 'border-blue-600', 'text-blue-600'));
      
      document.getElementById(`tab${n}`).classList.add('active');
      document.getElementById(`tab${n}-btn`).classList.add('border-b-4', 'border-blue-600', 'text-blue-600');
      
      if (n === 0 && !html5QrCode) startQR();
    }

    // ================== 초기화 ==================
    window.onload = function() {
      tailwind.config = { content: ["*"] };
      renderList();
      // 첫 화면 QR 스캔 자동 시작
      setTimeout(() => {
        if (document.getElementById('tab0').classList.contains('active')) startQR();
      }, 800);
    };
  </script>
</body>
</html>
